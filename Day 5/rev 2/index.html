<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <p class="hint">drag untuk rotate &nbsp;|&nbsp; Scroll to zoom</p>
        <div class="scene">
            <div class="cube" id="cube">
                <div class="front"><img src="1front.jpg" alt="front"></div>
                <div class="back"><img src="2back.jpg" alt="back"></div>
                <div class="right"><img src="3right.jpg" alt="right"></div>
                <div class="left"><img src="4left.jpg" alt="left"></div>
                <div class="top"><img src="5top.jpg" alt="top"></div>
                <div class="bottom"><img src="6bottom.jpg" alt="bottom"></div>
            </div>
        </div>
        <div class="controls">
            <button onclick="setView(15,0)">▶ Auto</button>
            <button onclick="setView(0,0)">Front</button>
            <button onclick="setView(0,180)">Back</button>
            <button onclick="setView(0,90)">Right</button>
            <button onclick="setView(0,-90)">Left</button>
            <button onclick="setView(90,0)">Top</button>
            <button onclick="setView(-90,0)">Bottom</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
